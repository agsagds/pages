<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBR · Гайдлайн принятия решений</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.0/index.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.0.0/index.css">
<style>
:root {
  --bg: #fafaf9;
  --bg-elev: #ffffff;
  --bg-elev-2: #f5f5f4;
  --bg-hover: #ececec;
  --border: #e7e5e4;
  --border-strong: #d6d3d1;
  --text: #1c1917;
  --text-dim: #57534e;
  --text-muted: #a8a29e;
  --accent: #2563eb;
  --accent-soft: #dbeafe;
  --green: #16a34a;
  --green-soft: #dcfce7;
  --yellow: #ca8a04;
  --yellow-soft: #fef9c3;
  --red: #dc2626;
  --red-soft: #fee2e2;
  --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
}
[data-theme="dark"] {
  --bg: #0a0a0b;
  --bg-elev: #121214;
  --bg-elev-2: #1a1a1e;
  --bg-hover: #222226;
  --border: #2a2a30;
  --border-strong: #3a3a42;
  --text: #e8e8ed;
  --text-dim: #a0a0ab;
  --text-muted: #6b6b75;
  --accent: #60a5fa;
  --accent-soft: #1e3a8a33;
  --green: #4ade80;
  --green-soft: #0d281833;
  --yellow: #fbbf24;
  --yellow-soft: #2a1f0533;
  --red: #f87171;
  --red-soft: #2a0d0d33;
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}
::selection { background: var(--accent); color: #fff; }

.app { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; }

/* ============ SIDEBAR ============ */
.sidebar {
  position: sticky; top: 0; height: 100vh;
  background: var(--bg-elev);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex; flex-direction: column;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.sidebar-head {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.logo-mark {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 800; font-size: 14px;
}
.logo-text { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; }
.logo-sub { font-size: 11px; color: var(--text-muted); font-weight: 500; }

.progress-mini {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
}
.progress-bar-mini {
  flex: 1; height: 4px; background: var(--bg-elev-2);
  border-radius: 2px; overflow: hidden;
}
.progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }

.mode-switch {
  display: flex; padding: 12px 16px; gap: 4px;
  border-bottom: 1px solid var(--border);
}
.mode-btn {
  flex: 1; padding: 6px 10px; border: none;
  background: transparent; color: var(--text-dim);
  font-size: 12px; font-weight: 500; font-family: inherit;
  border-radius: 6px; cursor: pointer;
  transition: all 0.15s;
}
.mode-btn:hover { background: var(--bg-hover); color: var(--text); }
.mode-btn.active { background: var(--bg-elev-2); color: var(--text); }

.nav-scroll { flex: 1; overflow-y: auto; padding: 12px 0; }
.nav-group { margin-bottom: 4px; }
.nav-group-title {
  padding: 8px 20px 6px;
  font-size: 10.5px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-muted);
  display: flex; align-items: center; gap: 8px;
}
.nav-group-title .count {
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-muted); font-size: 10px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 20px;
  cursor: pointer;
  color: var(--text-dim); font-size: 13px;
  border-left: 2px solid transparent;
  transition: all 0.15s;
  position: relative;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active {
  background: var(--accent-soft);
  color: var(--accent);
  border-left-color: var(--accent);
  font-weight: 500;
}
.nav-item .check {
  width: 16px; height: 16px; border-radius: 50%;
  border: 1.5px solid var(--border-strong);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}
.nav-item.completed .check {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}
.nav-item .check svg { width: 10px; height: 10px; opacity: 0; }
.nav-item.completed .check svg { opacity: 1; }
.nav-item .title { flex: 1; line-height: 1.35; }
.nav-item .num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text-muted);
}

.sidebar-foot {
  padding: 12px 16px; border-top: 1px solid var(--border);
  display: flex; gap: 6px;
}
.icon-btn {
  width: 34px; height: 34px; border-radius: 7px;
  background: transparent; border: 1px solid transparent;
  color: var(--text-dim); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.icon-btn:hover { background: var(--bg-elev-2); color: var(--text); border-color: var(--border); }
.foot-btn {
  flex: 1; padding: 8px 12px; border-radius: 7px;
  background: transparent; border: 1px solid var(--border);
  color: var(--text-dim); cursor: pointer; font-family: inherit;
  font-size: 12px; font-weight: 500;
  transition: all 0.15s;
}
.foot-btn:hover { background: var(--bg-elev-2); color: var(--text); }
.foot-btn.danger:hover { background: var(--red-soft); color: var(--red); border-color: var(--red); }

/* ============ MAIN ============ */
.main {
  padding: 40px 64px 120px;
  max-width: 860px;
  margin: 0 auto;
  width: 100%;
}

.breadcrumbs {
  display: flex; align-items: center; gap: 8px;
  font-size: 12.5px; color: var(--text-muted);
  margin-bottom: 16px;
  font-family: 'JetBrains Mono', monospace;
}
.breadcrumbs .sep { opacity: 0.4; }
.breadcrumbs .current { color: var(--text-dim); }

.step-header { margin-bottom: 32px; }
.step-meta {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px;
}
.badge {
  padding: 3px 9px; border-radius: 100px;
  font-size: 11px; font-weight: 500;
  background: var(--bg-elev-2); color: var(--text-dim);
  border: 1px solid var(--border);
}
.badge.accent { background: var(--accent-soft); color: var(--accent); border-color: transparent; }
.step-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text-muted);
  padding: 3px 8px; border-radius: 4px;
  background: var(--bg-elev-2);
}
h1.step-title {
  font-size: 32px; font-weight: 700; letter-spacing: -0.03em;
  line-height: 1.15; margin-bottom: 8px;
}
.step-subtitle {
  font-size: 15px; color: var(--text-dim); font-style: italic;
}

.card {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 22px 24px;
  margin: 16px 0;
  transition: border-color 0.15s;
}
.card:hover { border-color: var(--border-strong); }
.card-title {
  font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-muted); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.card-title svg { width: 14px; height: 14px; }

.essence { border-left: 3px solid var(--accent); }
.essence .card-title { color: var(--accent); }

.warning { border-left: 3px solid var(--yellow); }
.warning .card-title { color: var(--yellow); }

.action { border-left: 3px solid var(--green); }
.action .card-title { color: var(--green); }

.card-body { font-size: 14.5px; color: var(--text-dim); }
.card-body p { margin-bottom: 10px; }
.card-body strong { color: var(--text); font-weight: 600; }
.card-body ul { padding-left: 20px; margin: 10px 0; }
.card-body li { margin-bottom: 8px; }

/* ============ CHECKLIST ============ */
.checklist { list-style: none; padding: 0; margin: 12px 0 0; }
.check-item {
  display: flex; gap: 12px; padding: 12px 14px;
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  border-radius: 9px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.15s;
  align-items: flex-start;
}
.check-item:hover { border-color: var(--border-strong); transform: translateX(2px); }
.check-item.checked {
  background: var(--green-soft);
  border-color: var(--green);
}
.check-item.checked .check-label { color: var(--text-dim); text-decoration: line-through; text-decoration-color: var(--text-muted); }
.check-box {
  width: 20px; height: 20px; border-radius: 6px;
  border: 2px solid var(--border-strong);
  flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  background: var(--bg-elev);
}
.check-item.checked .check-box {
  background: var(--green); border-color: var(--green);
}
.check-box svg { width: 12px; height: 12px; opacity: 0; color: #fff; }
.check-item.checked .check-box svg { opacity: 1; }
.check-label { font-size: 14px; line-height: 1.5; flex: 1; }
.check-label strong { display: block; margin-bottom: 2px; color: var(--text); font-weight: 600; font-size: 14px; }
.check-label .hint { font-size: 12.5px; color: var(--text-muted); margin-top: 2px; }

/* ============ NOTES ============ */
.notes-area {
  width: 100%; min-height: 100px;
  padding: 14px 16px; border-radius: 9px;
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  color: var(--text); font-family: inherit; font-size: 14px;
  line-height: 1.6; resize: vertical;
  outline: none;
  transition: border-color 0.15s;
}
.notes-area:focus { border-color: var(--accent); background: var(--bg-elev); }
.notes-area::placeholder { color: var(--text-muted); }
.notes-hint { font-size: 11.5px; color: var(--text-muted); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }

/* ============ NAV BUTTONS ============ */
.nav-buttons {
  display: flex; gap: 10px; margin-top: 32px;
  padding-top: 24px; border-top: 1px solid var(--border);
}
.btn {
  padding: 11px 20px; border-radius: 9px;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  color: var(--text); font-family: inherit;
  font-size: 13.5px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 8px;
}
.btn:hover { background: var(--bg-hover); border-color: var(--border-strong); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { filter: brightness(1.1); background: var(--accent); }
.btn.ghost { background: transparent; }
.btn svg { width: 14px; height: 14px; }
.btn-complete {
  margin-left: auto;
  background: var(--green-soft);
  border-color: var(--green);
  color: var(--green);
}
.btn-complete:hover { background: var(--green); color: #fff; }
.btn-complete.done { background: var(--green); color: #fff; }

/* ============ HOME ============ */
.hero { margin-bottom: 40px; }
.hero h1 {
  font-size: 44px; font-weight: 800; letter-spacing: -0.04em;
  line-height: 1.05; margin-bottom: 18px;
  background: linear-gradient(135deg, var(--text) 30%, var(--accent) 70%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.hero p { font-size: 17px; color: var(--text-dim); max-width: 620px; line-height: 1.65; }

.path-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin: 28px 0; }
.path-card {
  padding: 20px; border-radius: 12px;
  background: var(--bg-elev); border: 1px solid var(--border);
  cursor: pointer; transition: all 0.2s;
}
.path-card:hover { border-color: var(--border-strong); transform: translateY(-2px); box-shadow: var(--shadow); }
.path-card .icon {
  width: 36px; height: 36px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; margin-bottom: 12px;
  background: var(--accent-soft); color: var(--accent);
}
.path-card h3 { font-size: 14.5px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.01em; }
.path-card p { font-size: 12.5px; color: var(--text-muted); line-height: 1.5; }
.path-card .meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text-muted); margin-top: 10px;
  display: flex; justify-content: space-between;
}

.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin: 28px 0; }
.stat {
  padding: 16px; background: var(--bg-elev);
  border: 1px solid var(--border); border-radius: 10px;
  text-align: center;
}
.stat .num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px; font-weight: 700; color: var(--accent);
  letter-spacing: -0.02em;
}
.stat .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

.article-row {
  display: flex; gap: 14px; padding: 14px 16px;
  background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: 10px; margin-bottom: 8px; cursor: pointer;
  transition: all 0.15s; align-items: center;
}
.article-row:hover { border-color: var(--border-strong); transform: translateX(2px); }
.article-row .a-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text-muted);
  background: var(--bg-elev-2); padding: 3px 8px; border-radius: 5px;
  min-width: 32px; text-align: center;
}
.article-row .a-body { flex: 1; }
.article-row .a-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.article-row .a-authors { font-size: 12px; color: var(--text-muted); }
.article-row .a-progress {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text-muted);
}

.section-head { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin: 32px 0 12px; }

@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: fixed; z-index: 100; width: 100%; transform: translateX(-100%); transition: transform 0.3s; }
  .sidebar.open { transform: translateX(0); }
  .main { padding: 20px; }
  h1.step-title { font-size: 24px; }
  .hero h1 { font-size: 30px; }
  .menu-toggle { display: flex !important; }
}
.menu-toggle { display: none; position: fixed; top: 16px; left: 16px; z-index: 99; }
</style>
</head>
<body>
<button class="menu-toggle icon-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')" style="background:var(--bg-elev); border:1px solid var(--border)">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="logo">
        <div class="logo-mark">H</div>
        <div>
          <div class="logo-text">Решения · Гайдлайн</div>
          <div class="logo-sub">10 статей HBR · Практика</div>
        </div>
      </div>
      <div class="progress-mini">
        <span id="progressText">0 / 0</span>
        <div class="progress-bar-mini"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <span id="progressPct">0%</span>
      </div>
    </div>
    <div class="mode-switch">
      <button class="mode-btn active" data-mode="sequential" onclick="setMode('sequential')">Последовательно</button>
      <button class="mode-btn" data-mode="article" onclick="setMode('article')">По статьям</button>
    </div>
    <div class="nav-scroll" id="navScroll"></div>
    <div class="sidebar-foot">
      <button class="foot-btn" onclick="toggleTheme()" id="themeBtn">🌙 Тема</button>
      <button class="foot-btn danger" onclick="resetAll()">Сброс</button>
    </div>
  </aside>

  <main class="main" id="main"></main>
</div>

<script>
// ============================================================
// STEPS DATA — практические шаги из 10 статей
// ============================================================
const ARTICLES = [
  { id: 'a1', num: '01', title: 'Скрытые ловушки процесса', authors: 'Хэммонд, Кини, Райффа', category: 'calibration', categoryName: 'Калибровка' },

];

const STEPS = [
  // Статья 1
  { id: '1-1', article: 'a1', num: '1.1', title: 'Проверка на якорение', subtitle: 'Первый вход доминирует над остальными',

let state = {
  mode: 'sequential',
  currentStep: 'home',
  completed: JSON.parse(localStorage.getItem('hbr_completed') || '{}'),
  notes: JSON.parse(localStorage.getItem('hbr_notes') || '{}'),
  checks: JSON.parse(localStorage.getItem('hbr_checks') || '{}'),
  theme: localStorage.getItem('hbr_theme') || 'light',
};

function save() {
  localStorage.setItem('hbr_completed', JSON.stringify(state.completed));
  localStorage.setItem('hbr_notes', JSON.stringify(state.notes));
  localStorage.setItem('hbr_checks', JSON.stringify(state.checks));
  localStorage.setItem('hbr_theme', state.theme);
}

// RENDER
// ============================================================
function renderNav() {
  const nav = document.getElementById('navScroll');
  let html = `<div class="nav-item ${state.currentStep === 'home' ? 'active' : ''}" onclick="showHome()">
    <span class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
    </span>
    <span class="title">📋 Обзор и выбор пути</span>
  </div>`;

  if (state.mode === 'sequential') {
    const groups = {};
    STEPS.forEach(s => {
      const a = ARTICLES.find(x => x.id === s.article);
      const key = a.id;
      if (!groups[key]) groups[key] = { article: a, steps: [] };
      groups[key].steps.push(s);
    });
    Object.values(groups).forEach(g => {
      const completedInGroup = g.steps.filter(s => state.completed[s.id]).length;
      html += `<div class="nav-group">
        <div class="nav-group-title">
          <span>Статья ${g.article.num} · ${g.article.categoryName}</span>
          <span class="count">${completedInGroup}/${g.steps.length}</span>
        </div>`;
      g.steps.forEach(s => {
        html += navItemHtml(s);
      });
      html += `</div>`;
    });
  } else {
    const grouped = {};
    ARTICLES.forEach(a => { grouped[a.id] = { article: a, steps: STEPS.filter(s => s.article === a.id) }; });
    Object.values(grouped).forEach(g => {
      const completedInGroup = g.steps.filter(s => state.completed[s.id]).length;
      html += `<div class="nav-group">
        <div class="nav-group-title">
          <span>${g.article.num}. ${g.article.title}</span>
          <span class="count">${completedInGroup}/${g.steps.length}</span>
        </div>`;
      g.steps.forEach(s => html += navItemHtml(s));
      html += `</div>`;
    });
  }
  nav.innerHTML = html;
  updateProgress();
}

function navItemHtml(s) {
  const active = state.currentStep === s.id;
  const completed = state.completed[s.id];
  return `<div class="nav-item ${active ? 'active' : ''} ${completed ? 'completed' : ''}" onclick="showStep('${s.id}')">
    <span class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
    </span>
    <span class="title">${s.title}</span>
    <span class="num">${s.num}</span>
  </div>`;
}

function updateProgress() {
  const total = STEPS.length;
  const done = Object.values(state.completed).filter(Boolean).length;
  const pct = Math.round(done / total * 100);
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = pct + '%';
}

function showNext() {
  const next = STEPS.find(s => !state.completed[s.id]);
  if (next) showStep(next.id);
  else showStep(STEPS[STEPS.length - 1].id);
}

function showStep(id) {

  const idx = STEPS.findIndex(s => s.id === id);

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4M12 17h.01"/></svg>
        На что обратить внимание
      </div>
      <div class="card-body">${step.warning}</div>
    </div>

    <div class="card action">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Практический чек-лист
      </div>
      <ul class="checklist">
        ${step.checklist.map((c, i) => `
          <li class="check-item ${checks[i] ? 'checked' : ''}" onclick="toggleCheck('${id}', ${i})">
            <div class="check-box">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="check-label">
              <strong>${c.t}</strong>
              ${c.h ? `<div class="hint">${c.h}</div>` : ''}
            </div>
          </li>
        `).join('')}
      </ul>
    </div>

    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Заметки для этого шага
      </div>
      <textarea class="notes-area" placeholder="Что из этого применимо к вашей текущей ситуации? Какие решения сейчас перед вами стоят?" oninput="saveNote('${id}', this.value)">${state.notes[id] || ''}</textarea>
      <div class="notes-hint">Сохраняется автоматически · ${Object.keys(state.notes).filter(k => state.notes[k]).length} шагов с заметками</div>
    </div>

    <div class="nav-buttons">
      ${prev ? `<button class="btn ghost" onclick="showStep('${prev.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        ${prev.title.substring(0, 20)}${prev.title.length > 20 ? '…' : ''}
      </button>` : `<button class="btn ghost" onclick="showHome()">← Обзор</button>`}
      <button class="btn btn-complete ${isCompleted ? 'done' : ''}" onclick="toggleComplete('${id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        ${isCompleted ? 'Пройдено' : 'Отметить пройденным'}
      </button>
      ${next ? `<button class="btn primary" onclick="showStep('${next.id}')">
        Далее
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>` : `<button class="btn primary" onclick="showHome()">Завершить</button>`}
    </div>
  `;
  window.scrollTo({ top: 0 });
}

// ============================================================
// ACTIONS
// ============================================================
function toggleCheck(stepId, idx) {
  if (!state.checks[stepId]) state.checks[stepId] = new Array(STEPS.find(s => s.id === stepId).checklist.length).fill(false);
  state.checks[stepId][idx] = !state.checks[stepId][idx];
  save();
  showStep(stepId);
}

function saveNote(stepId, value) {
  state.notes[stepId] = value;
  save();
}

function toggleComplete(stepId) {
  state.completed[stepId] = !state.completed[stepId];
  save();
  showStep(stepId);
  // Auto-advance if just completed
  if (state.completed[stepId]) {
    const idx = STEPS.findIndex(s => s.id === stepId);
    const next = STEPS[idx + 1];
    if (next) setTimeout(() => showStep(next.id), 300);
  }
}

function setMode(mode) {
  state.mode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  renderNav();
}

function toggleTheme() {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', state.theme);
  document.getElementById('themeBtn').textContent = state.theme === 'light' ? '🌙 Тема' : '☀ Тема';
  save();
}

function resetAll() {
  if (!confirm('Сбросить весь прогресс, заметки и чек-листы?')) return;
  state.completed = {};
  state.notes = {};
  state.checks = {};
  save();
  showHome();
}

// ============================================================
// INIT
// ============================================================
document.documentElement.setAttribute('data-theme', state.theme);
document.getElementById('themeBtn').textContent = state.theme === 'light' ? '🌙 Тема' : '☀ Тема';
renderNav();
showHome();
</script>
</body>
</html>
