<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Квиз — SA Knowledge Sharing</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="app-container">
    <div class="screen active" id="startScreen">
      <div class="quiz-icon-large" id="quizIcon">🧠</div>
      <h1 id="quizTitle">Загрузка...</h1>
      <p class="subtitle" id="quizDesc"></p>
      <p class="meta" id="quizMeta"></p>
      <div class="start-actions">
        <button class="btn btn-primary" id="btnStart" type="button">Начать квиз</button>
        <a href="index.html" class="btn btn-back">← Назад к списку</a>
      </div>
    </div>

    <div class="screen quiz-view" id="quizScreen">
      <div class="progress-container">
        <div class="progress-info">
          <span class="progress-label">Прогресс</span>
          <span class="progress-counter" id="progressCounter">1 / 5</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      </div>

      <div class="question-card">
        <div class="q-badge" id="questionBadge">Вопрос 1</div>
        <p class="q-text" id="questionText"></p>
      </div>

      <div class="options-list" id="optionsList"></div>

      <div class="explanation" id="explanation">
        <div class="exp-header" id="expHeader">
          <span id="expIcon"></span>
          <span id="expTitle"></span>
        </div>
        <p class="exp-text" id="expText"></p>
      </div>

      <div class="nav-area">
        <button class="btn btn-next" id="btnNext" type="button">Далее →</button>
      </div>
    </div>

    <div class="screen" id="resultScreen">
      <div class="result-icon">✓</div>
      <h1>Квиз завершён</h1>
      <div class="score-display">
        <span class="score-num" id="scoreNum">0</span>
        <span class="score-tot" id="scoreTot">/ 5</span>
      </div>
      <p class="score-msg" id="scoreMsg"></p>
      <div class="stats-row">
        <div class="stat-item">
          <span class="stat-val green" id="statCorr">0</span>
          <span class="stat-lbl">Верно</span>
        </div>
        <div class="stat-item">
          <span class="stat-val red" id="statWrong">0</span>
          <span class="stat-lbl">Неверно</span>
        </div>
      </div>
      <div class="start-actions">
        <button class="btn btn-primary" id="btnRestart" type="button">Пройти заново</button>
        <a href="index.html" class="btn btn-back">← Все квизы</a>
      </div>
    </div>
  </div>

  <script src="js/quiz.js"></script>
  <script>
    document.getElementById('btnStart').addEventListener('click', startQuiz);
    document.getElementById('btnNext').addEventListener('click', nextQuestion);
    document.getElementById('btnRestart').addEventListener('click', restartQuiz);
  </script>
</body>
</html>
