<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Квиз: Нейросети и Embeddings</title>
<style>
  :root {
    --bg-primary: #0B1A30;
    --bg-secondary: #112240;
    --bg-card: #1A2D4A;
    --accent: #64FFDA;
    --accent-blue: #3B82F6;
    --accent-glow: rgba(100, 255, 218, 0.15);
    --text-primary: #E6F1FF;
    --text-secondary: #8892B0;
    --text-muted: #5A6A8A;
    --correct: #64FFDA;
    --wrong: #FF6B6B;
    --border: rgba(100, 255, 218, 0.1);
    --shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .bg-pattern {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(100, 255, 218, 0.05) 0%, transparent 50%);
  }
  .app-container {
    position: relative; z-index: 1; max-width: 680px; margin: 0 auto;
    padding: 20px; min-height: 100vh; display: flex; flex-direction: column;
  }
  .screen {
    display: none; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; text-align: center; width: 100%;
  }
  .screen.active { display: flex; animation: fadeIn 0.6s ease; }
  .screen.quiz-view { justify-content: flex-start; align-items: stretch; }
  .hero-visual, .result-visual {
    width: 160px; height: 160px; margin-bottom: 28px;
    animation: float 6s ease-in-out infinite;
  }
  h1 {
    font-size: clamp(24px, 5vw, 32px); font-weight: 700; margin-bottom: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-blue));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle {
    color: var(--text-secondary); font-size: 16px; line-height: 1.5;
    margin-bottom: 6px; max-width: 420px;
  }
  .meta { color: var(--text-muted); font-size: 13px; margin-bottom: 32px; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 36px; border: 1px solid var(--accent); background: transparent;
    color: var(--accent); font-family: inherit; font-size: 15px; font-weight: 600;
    border-radius: 8px; cursor: pointer; transition: all 0.3s ease;
  }
  .btn:hover { background: var(--accent-glow); box-shadow: 0 0 20px rgba(100, 255, 218, 0.15); transform: translateY(-1px); }
  .btn-primary { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); }
  .btn-primary:hover { background: #52E2C2; box-shadow: 0 0 30px rgba(100, 255, 218, 0.3); }
  .progress-container { margin-bottom: 24px; padding-top: 12px; }
  .progress-info { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .progress-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
  .progress-counter { font-size: 13px; color: var(--accent); font-weight: 600; }
  .progress-track { width: 100%; height: 4px; background: var(--bg-card); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-blue)); border-radius: 4px; transition: width 0.5s ease; }
  .question-card {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px 24px; margin-bottom: 20px; box-shadow: var(--shadow);
  }
  .q-badge {
    display: inline-block; font-size: 11px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px;
    padding: 4px 10px; background: var(--accent-glow); border-radius: 4px;
  }
  .q-text { font-size: clamp(16px, 3.5vw, 19px); font-weight: 600; line-height: 1.5; }
  .options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .option-btn {
    display: flex; align-items: flex-start; gap: 14px; width: 100%;
    padding: 16px 18px; background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text-primary); font-family: inherit;
    font-size: 15px; line-height: 1.45; text-align: left; cursor: pointer; transition: all 0.25s ease;
  }
  .option-btn:hover:not(.disabled) { border-color: rgba(100, 255, 218, 0.3); background: rgba(100, 255, 218, 0.04); transform: translateX(4px); }
  .opt-letter {
    flex-shrink: 0; width: 30px; height: 30px; display: flex; align-items: center;
    justify-content: center; border-radius: 8px; background: var(--bg-card);
    border: 1px solid var(--border); font-size: 13px; font-weight: 700; color: var(--accent); transition: all 0.25s ease;
  }
  .option-btn.correct { border-color: var(--correct); background: rgba(100, 255, 218, 0.08); }
  .option-btn.correct .opt-letter { background: var(--correct); color: var(--bg-primary); border-color: var(--correct); }
  .option-btn.wrong { border-color: var(--wrong); background: rgba(255, 107, 107, 0.08); }
  .option-btn.wrong .opt-letter { background: var(--wrong); color: var(--bg-primary); border-color: var(--wrong); }
  .option-btn.disabled { cursor: default; opacity: 0.5; }
  .option-btn.correct.disabled, .option-btn.wrong.disabled { opacity: 1; }
  .explanation {
    display: none; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px; margin-bottom: 20px; animation: slideUp 0.4s ease; text-align: left;
  }
  .explanation.visible { display: block; }
  .exp-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 14px; font-weight: 600; }
  .exp-header.correct-header { color: var(--correct); }
  .exp-header.wrong-header { color: var(--wrong); }
  .exp-text { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
  .nav-area { display: flex; justify-content: flex-end; margin-top: auto; padding-top: 16px; }
  .btn-next { display: none; }
  .btn-next.visible { display: inline-flex; animation: fadeIn 0.3s ease; }
  .score-display { display: flex; align-items: baseline; gap: 4px; margin-bottom: 6px; }
  .score-num { font-size: 56px; font-weight: 700; color: var(--accent); }
  .score-tot { font-size: 22px; color: var(--text-muted); font-weight: 500; }
  .score-msg { font-size: 16px; color: var(--text-secondary); margin-bottom: 28px; line-height: 1.5; }
  .stats-row { display: flex; gap: 32px; margin-bottom: 32px; }
  .stat-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .stat-val { font-size: 24px; font-weight: 700; }
  .stat-val.green { color: var(--correct); }
  .stat-val.red { color: var(--wrong); }
  .stat-lbl { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }
  .shake { animation: shake 0.4s ease; }
  @media (max-width: 480px) {
    .app-container { padding: 16px; }
    .question-card { padding: 20px 16px; }
    .option-btn { padding: 14px 14px; font-size: 14px; }
    .stats-row { gap: 24px; }
    .score-num { font-size: 48px; }
  }
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="app-container">

  <div class="screen active" id="startScreen">
    <svg class="hero-visual" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="10" y="10" width="140" height="140" rx="30" fill="#112240" stroke="rgba(100,255,218,0.2)" stroke-width="2"/>
      <g transform="translate(40, 40)">
        <line x1="40" y1="0" x2="0" y2="80" stroke="#5A6A8A" stroke-width="2"/>
        <line x1="40" y1="0" x2="80" y2="80" stroke="#5A6A8A" stroke-width="2"/>
        <circle cx="40" cy="0" r="6" fill="#3B82F6"/>
        <circle cx="0" cy="80" r="6" fill="#64FFDA"/>
        <circle cx="80" cy="80" r="6" fill="#64FFDA"/>
        <path d="M-5 80 Q 40 110 85 80" stroke="#64FFDA" stroke-width="2" fill="none" opacity="0.5"/>
      </g>
      <rect x="60" y="95" width="40" height="20" rx="4" fill="#0B1A30" stroke="#64FFDA" stroke-width="1.5"/>
      <text x="80" y="109" font-family="monospace" font-size="10" fill="#64FFDA" text-anchor="middle">[v]</text>
    </svg>
    <h1>AI & Embeddings</h1>
    <p class="subtitle">Проверьте знания о функциях активации, обратном распространении и семантических векторах</p>
    <p class="meta">5 вопросов · ~2 мин</p>
    <button class="btn btn-primary" onclick="startQuiz()">Начать квиз</button>
  </div>

  <div class="screen quiz-view" id="quizScreen">
    <div class="progress-container">
      <div class="progress-info">
        <span class="progress-label">Прогресс</span>
        <span class="progress-counter" id="progressCounter">1 / 5</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width: 20%"></div></div>
    </div>
    <div class="question-card">
      <div class="q-badge" id="questionBadge">Вопрос 1</div>
      <p class="q-text" id="questionText"></p>
    </div>
    <div class="options-list" id="optionsList"></div>
    <div class="explanation" id="explanation">
      <div class="exp-header" id="expHeader">
        <span id="expIcon"></span>
        <span id="expTitle"></span>
      </div>
      <p class="exp-text" id="expText"></p>
    </div>
    <div class="nav-area"><button class="btn btn-next" id="btnNext" onclick="nextQuestion()">Далее →</button></div>
  </div>

  <div class="screen" id="resultScreen">
    <svg class="result-visual" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="80" cy="80" r="60" fill="#112240" stroke="#64FFDA" stroke-width="3" opacity="0.8"/>
      <circle cx="80" cy="80" r="40" fill="#0B1A30" stroke="rgba(100,255,218,0.3)" stroke-width="2"/>
      <path d="M65 80L73 88L90 71" stroke="#64FFDA" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="80" cy="80" r="75" stroke="rgba(59,130,246,0.2)" stroke-width="2" stroke-dasharray="4 6"/>
    </svg>
    <h1 id="resultTitle">Квиз завершён</h1>
    <div class="score-display">
      <span class="score-num" id="scoreNum">0</span>
      <span class="score-tot">/ 5</span>
    </div>
    <p class="score-msg" id="scoreMsg"></p>
    <div class="stats-row">
      <div class="stat-item"><span class="stat-val green" id="statCorr">0</span><span class="stat-lbl">Верно</span></div>
      <div class="stat-item"><span class="stat-val red" id="statWrong">0</span><span class="stat-lbl">Неверно</span></div>
    </div>
    <button class="btn btn-primary" onclick="restartQuiz()">Пройти заново</button>
  </div>

</div>

<script>
const quizData = [
  {
    question: "Зачем в нейронной сети нужны функции активации?",
    options: [
      "Чтобы сохранять историю предыдущих сеансов",
      "Чтобы сжимать и нормализовать выходы узла в удобный диапазон и добавить нелинейность",
      "Чтобы автоматически обучать сеть без ошибок",
      "Чтобы заменить веса в сети"
    ],
    correct: 1,
    explanation: "Функции активации (например, Sigmoid, Tanh) превращают сумму входов в управляемый выход, стабилизируют обучение и позволяют использовать backpropagation."
  },
  {
    question: "Какова основная роль весов в перцептроне?",
    options: [
      "Определять длину текста, который модель может помнить",
      "Управлять вкладом каждого входа в итоговый результат",
      "Делать ответы модели случайными",
      "Задавать температуру генерации"
    ],
    correct: 1,
    explanation: "Веса умножаются на входные данные, регулируя, насколько сильно каждый вход влияет на финальную сумму и решение узла."
  },
  {
    question: "Зачем нужен backpropagation?",
    options: [
      "Чтобы переводить слова в числа",
      "Чтобы понять, какой вклад каждый вес внес в ошибку, и скорректировать сеть",
      "Чтобы выбирать случайный ответ из нескольких вариантов",
      "Чтобы добавлять больше слоев в нейросеть"
    ],
    correct: 1,
    explanation: "Алгоритм распределяет ошибку назад по сети, вычисляет градиенты и корректирует веса, чтобы минимизировать ошибку в будущем."
  },
  {
    question: "Что дает рекуррентная нейросеть (RNN) по сравнению с обычной?",
    options: [
      "Умение работать с последовательностями и помнить предыдущие состояния",
      "Полное устранение необходимости в обучении",
      "Мгновенное повышение точности на любых задачах",
      "Возможность обходиться без входных данных"
    ],
    correct: 0,
    explanation: "RNN возвращают предыдущее состояние (h_t-1) обратно на вход, что позволяет учитывать контекст при обработке последовательностей."
  },
  {
    question: "Зачем в языковых моделях нужен embedding?",
    options: [
      "Чтобы хранить пароль пользователя",
      "Чтобы превратить слова в компактные векторы, где похожие слова находятся ближе друг к другу",
      "Чтобы увеличить размер словаря до бесконечности",
      "Чтобы заменить softmax"
    ],
    correct: 1,
    explanation: "Embeddings (векторные представления) переводят слова в плотные многомерные векторы, сохраняя их семантические связи и контекст."
  }
];

const letters = ['A', 'B', 'C', 'D'];
let current = 0, score = 0, answered = false;

function startQuiz() {
  document.getElementById('startScreen').classList.remove('active');
  document.getElementById('quizScreen').classList.add('active');
  current = 0; score = 0; render();
}

function render() {
  answered = false;
  const d = quizData[current];
  document.getElementById('questionBadge').textContent = `Вопрос ${current + 1}`;
  document.getElementById('questionText').textContent = d.question;
  document.getElementById('progressCounter').textContent = `${current + 1} / ${quizData.length}`;
  document.getElementById('progressFill').style.width = `${((current + 1) / quizData.length) * 100}%`;
  
  const list = document.getElementById('optionsList');
  list.innerHTML = '';
  d.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => select(i);
    list.appendChild(btn);
  });

  document.getElementById('explanation').classList.remove('visible');
  document.getElementById('btnNext').classList.remove('visible');
}

function select(idx) {
  if (answered) return; answered = true;
  const d = quizData[current];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((b, i) => {
    b.classList.add('disabled');
    if (i === d.correct) b.classList.add('correct');
    if (i === idx && idx !== d.correct) b.classList.add('wrong', 'shake');
  });
  if (idx === d.correct) score++;

  const header = document.getElementById('expHeader');
  const icon = document.getElementById('expIcon');
  const title = document.getElementById('expTitle');
  const text = document.getElementById('expText');

  header.className = `exp-header ${idx === d.correct ? 'correct-header' : 'wrong-header'}`;
  icon.textContent = idx === d.correct ? '✓' : '✗';
  title.textContent = idx === d.correct ? 'Правильно!' : 'Неправильно';
  text.textContent = d.explanation;
  document.getElementById('explanation').classList.add('visible');

  const next = document.getElementById('btnNext');
  next.textContent = current < quizData.length - 1 ? 'Далее →' : 'Результаты';
  next.classList.add('visible');
}

function nextQuestion() {
  current++;
  if (current < quizData.length) render();
  else showResults();
}

function showResults() {
  document.getElementById('quizScreen').classList.remove('active');
  document.getElementById('resultScreen').classList.add('active');
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('statCorr').textContent = score;
  document.getElementById('statWrong').textContent = quizData.length - score;
  document.getElementById('scoreMsg').textContent = 
    score === 5 ? 'Отлично! Вы отлично разбираетесь в основах AI.' :
    score >= 3 ? 'Хороший результат. Попробуйте перечитать материалы для лучшего понимания.' :
    'Стоит повторить тему и попробовать снова.';
}

function restartQuiz() {
  document.getElementById('resultScreen').classList.remove('active');
  document.getElementById('startScreen').classList.add('active');
}
</script>
</body>
</html>
