<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Quizzes — SA Knowledge Sharing</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="app-container">
    <div class="screen active">
      <svg class="hero-visual" viewBox="0 0 160 160" fill="none" aria-hidden="true">
        <rect x="20" y="20" width="120" height="120" rx="24" fill="#112240" stroke="rgba(100,255,218,0.2)" stroke-width="2"/>
        <circle cx="50" cy="60" r="8" fill="#64FFDA"/>
        <circle cx="110" cy="60" r="8" fill="#3B82F6"/>
        <circle cx="50" cy="110" r="8" fill="#3B82F6"/>
        <circle cx="110" cy="110" r="8" fill="#64FFDA"/>
        <line x1="50" y1="60" x2="110" y2="60" stroke="#5A6A8A" stroke-width="2"/>
        <line x1="50" y1="110" x2="110" y2="110" stroke="#5A6A8A" stroke-width="2"/>
        <line x1="50" y1="60" x2="50" y2="110" stroke="#5A6A8A" stroke-width="2"/>
        <line x1="110" y1="60" x2="110" y2="110" stroke="#5A6A8A" stroke-width="2"/>
        <rect x="70" y="75" width="20" height="10" rx="3" fill="#0B1A30" stroke="#64FFDA" stroke-width="1.5"/>
      </svg>
      <h1>SA Knowledge Sharing</h1>
      <p class="subtitle">Pick a quiz to test your knowledge</p>
      <div id="quizList" class="quiz-list"></div>
    </div>
  </div>

  <script src="js/index.js"></script>
</body>
</html>
